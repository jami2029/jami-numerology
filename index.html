<style>
  :root {
    --bg: #fdf6ff;
    --bg2: #f3e8ff;
    --accent: #a855f7;
    --accent2: #ec4899;
    --accent3: #06b6d4;
    --text: #1e1b2e;
    --muted: #7c6f9a;
    --card: #ffffff;
    --border: #e9d5ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景装飾 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:

      radial-gradient(circle at 85% 70%, rgba(236,72,153,0.1) 0%, transparent 40%),

    pointer-events: none;
    z-index: 0;

  .wrap {

    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* ヘッダー */
  .header {
    text-align: center;
    padding: 48px 0 32px;
  }

  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 20px;
    font-weight: 700;
  }

  .header h1 {
    font-size: clamp(26px, 7vw, 38px);
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, #f59e0b 100%);

    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
  }

  /* 浮遊する数字デコ */
  .deco-numbers {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .deco-num {
    position: absolute;
    font-family: 'Shippori Mincho', serif;
    font-weight: 700;
    opacity: 0.04;
    color: var(--accent);
    animation: floatNum linear infinite;
  }

    0% { transform: translateY(100vh) rotate(0deg); }
    100% { transform: translateY(-20vh) rotate(360deg); }

    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .form-row {

  }

  .date-inputs {
    display: flex;

    align-items: center;
  }

  .date-inputs select,

    font-size: 15px;
    color: var(--text);
    background: var(--bg);

  .date-inputs select:focus,

<script>
// 日付セレクト動的生成
document.getElementById('month').addEventListener('change', updateDays);
document.getElementById('year').addEventListener('change', updateDays);

function updateDays() {
  const y = parseInt(document.getElementById('year').value) || 2000;
  const m = parseInt(document.getElementById('month').value);
  const dayEl = document.getElementById('day');
  const cur = dayEl.value;
  dayEl.innerHTML = '<option value="">日</option>';
  if (!m) return;
  const days = new Date(y, m, 0).getDate();
  for (let i = 1; i <= days; i++) {
    const o = document.createElement('option');
    o.value = i; o.textContent = i + '日';
    if (i == cur) o.selected = true;
    dayEl.appendChild(o);
  }
}

// 浮遊数字背景
const deco = document.getElementById('decoNums');
for (let i = 0; i < 18; i++) {
  const el = document.createElement('div');
  el.className = 'deco-num';
  el.textContent = Math.floor(Math.random() * 9) + 1;
  el.style.left = Math.random() * 100 + '%';
  el.style.fontSize = (40 + Math.random() * 80) + 'px';
  el.style.animationDuration = (12 + Math.random() * 20) + 's';
  el.style.animationDelay = -(Math.random() * 30) + 's';
  deco.appendChild(el);
}

// 誕生数計算
function calcLifePath(y, m, d) {
  const str = String(y) + String(m) + String(d);
  let nums = str.split('').map(Number);
  function reduce(n) {
    if (n === 11 || n === 22) return n;
    if (n < 10) return n;
    return reduce(n.toString().split('').reduce((a, b) => a + parseInt(b), 0));
  }
  const sum = nums.reduce((a, b) => a + b, 0);
  return reduce(sum);
}

function diagnose() {
  const y = parseInt(document.getElementById('year').value);
  const m = parseInt(document.getElementById('month').value);
  const d = parseInt(document.getElementById('day').value);
  const name = document.getElementById('nickname').value.trim();

  if (!y || !m || !d) {
    alert('生年月日をすべて入力してください🔢');
    return;
  }
  if (y < 1920 || y > 2010) {
    alert('年を正しく入力してください');
    return;
  }

  // ローディング
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  setTimeout(() => {
    const num = calcLifePath(y, m, d);
    const info = data[num] || data[9];
    showResult(num, info, name, y, m, d);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 1800);
}

function showResult(num, info, name, y, m, d) {
  const isMaster = num === 11 || num === 22;
  const nameStr = name ? `${name}さんの` : 'あなたの';
  const hearts = Array.from({length: 5}, (_, i) =>
    `<span class="heart ${i < info.loveScore ? 'on' : 'off'}">♥</span>`
  ).join('');

  // 今年の個人年数
  const now = new Date();
  const thisYear = now.getFullYear();
  function calcPersonalYear(y2, m2, d2, year) {
    const str = String(m2) + String(d2) + String(year);
    let s = str.split('').reduce((a,b) => a + parseInt(b), 0);
    while (s > 9 && s !== 11 && s !== 22) {
      s = s.toString().split('').reduce((a,b) => a + parseInt(b), 0);
    }
    return s;
  }
  const py = calcPersonalYear(y, m, d, thisYear);

  document.getElementById('result').innerHTML = `
    <div class="result-header">
      <div class="result-number-wrap">
        <div class="result-number" style="background: linear-gradient(135deg, ${info.color}, ${info.color}99)">
          ${num}
        </div>
        <div class="result-number-ring"></div>
      </div>
      <div class="result-title">
        ${nameStr}誕生数は【${num}】${isMaster ? '<span class="master-badge">✨ MASTER</span>' : ''}
      </div>
      <div class="result-subtitle">${info.emoji} ${info.keyword}</div>
    </div>

    <div class="result-card">
      <div class="rc-label">PERSONALITY · 本質</div>
      <div class="rc-title">${info.emoji} ${info.keyword}タイプ</div>
      <div class="rc-text">${info.summary}</div>
      <div class="tag-list">
        ${info.good.map(t => `<span class="tag tag-good">✓ ${t}</span>`).join('')}
        ${info.bad.map(t => `<span class="tag tag-bad">△ ${t}</span>`).join('')}
      </div>
    </div>

    <div class="result-card">
      <div class="rc-label">LOVE · 恋愛傾向</div>
      <div class="rc-title">💕 恋愛相性スコア</div>
      <div class="love-meter">${hearts}</div>
      <div class="rc-text" style="margin-top:12px">${info.love}</div>
    </div>

    <div class="result-card">
      <div class="rc-label">WORK · 仕事運</div>
      <div class="rc-title">💼 向いてる仕事</div>
      <div class="rc-text">${info.work}</div>
    </div>

    <div class="result-card">
      <div class="rc-label">THIS YEAR · ${thisYear}年の運気</div>
      <div class="rc-title">📅 今年は「個人年${py}」の年</div>
      <div class="rc-text">今年のあなたのテーマは「${getPersonalYearTheme(py)}」。${getPersonalYearDesc(py)}</div>
    </div>

    <div class="result-card">
      <div class="rc-label">MESSAGE · ジャミより</div>
      <div class="rc-title">🌿 あなたへのメッセージ</div>
      <div class="rc-text">${info.advice}</div>
    </div>

    <div class="note-banner">
      <div class="nb-emoji">📖</div>
      <div class="nb-title">もっと詳しく知りたい人へ</div>
      <div class="nb-text">
        誕生数${num}の人の<br>
        「恋愛・仕事・今年の過ごし方」を<br>
        ジャミが徹底鑑定した記事を<br>
        noteで販売中🔢✨
      </div>
      <a class="note-btn" href="https://note.com" target="_blank">📝 noteで詳細鑑定を見る</a>
    </div>

    <div class="share-wrap">
      <button class="share-btn" onclick="shareResult(${num}, '${info.keyword}', '${info.emoji}')">
        𝕏 結果をXでシェアする
      </button>
    </div>
    <br>
    <button class="retry-btn" onclick="retry()">🔄 もう一度診断する</button>
  `;
}

function getPersonalYearTheme(n) {
  const t = {1:'スタート', 2:'育てる', 3:'表現', 4:'基盤作り', 5:'変化', 6:'愛と責任', 7:'内省', 8:'収穫', 9:'手放し', 11:'直感', 22:'大きな実現'};
  return t[n] || 'スタート';
}

  const d = {

    6: '愛と責任の年。家族・パートナー・コミュニティとの絆を深めて。',
    7: '内省と学びの年。一人の時間を大切に、自分と向き合って。',

    9: '手放しと完成の年。いらないものを手放すと新しいステージへ。',
    11: '直感が冴える特別な年。インスピレーションを信じて動いて。',
    22: '大きな夢を形にできる年。スケールの大きいことに挑戦して。'
  };
  return d[n] || '新しいことを始めるなら今！';

function shareResult(num, keyword, emoji) {
  const text = `ジャミの数秘術診断🔢\n\n私の誕生数は【${num}】${emoji}\nキーワード：「${keyword}」\n\nあなたも診断してみて✨\n\n#数秘術 #ジャミ診断`;
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

function retry() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('result').innerHTML = '';
  document.getElementById('formSection').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
